{% extends "base_auth.html" %}
{% block title %}Login — SmartAttend{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <h1>SmartAttend</h1>
    <p>AI-Powered Attendance System</p>
  </div>

  <form method="POST" action="{{ url_for('login') }}" class="auth-form" id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" name="email" placeholder="you@company.com" required autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" id="pwdInput">
        <button type="button" class="eye-btn" onclick="togglePwd()">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-primary btn-full" id="loginBtn">
      <span class="btn-text">Sign In</span>
      <span class="btn-spinner" style="display:none"></span>
    </button>
  </form>

  <div class="auth-hint">
    <div class="admin-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Admin: <code>admin@attend.com</code> / <code>admin123</code>
    </div>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
  </div>
</div>

<script>
function togglePwd() {
  const i = document.getElementById('pwdInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}
document.getElementById('loginForm').addEventListener('submit', function() {
  document.getElementById('loginBtn').querySelector('.btn-text').style.display = 'none';
  document.getElementById('loginBtn').querySelector('.btn-spinner').style.display = 'inline-block';
  document.getElementById('loginBtn').disabled = true;
});
</script>
{% endblock %}
